<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" width="1400" height="480" preserveAspectRatio="xMidYMid meet">
  <!-- =================== BACKGROUND =================== -->
  <rect width="1400" height="480" fill="#070A10"/>

  <!-- Faint horizontal grid (tactical readout vibe) -->
  <g stroke="#27324A" stroke-opacity="0.45" stroke-width="1">
    <line x1="0" y1="60"  x2="1400" y2="60"/>
    <line x1="0" y1="120" x2="1400" y2="120"/>
    <line x1="0" y1="180" x2="1400" y2="180"/>
    <line x1="0" y1="240" x2="1400" y2="240"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="360" x2="1400" y2="360"/>
    <line x1="0" y1="420" x2="1400" y2="420"/>
  </g>

  <!-- =================== CORNER BRACKETS =================== -->
  <g fill="#FF6B1A">
    <!-- top-left -->
    <rect x="24"   y="24"  width="56" height="4"/>
    <rect x="24"   y="24"  width="4"  height="56"/>
    <!-- top-right -->
    <rect x="1320" y="24"  width="56" height="4"/>
    <rect x="1372" y="24"  width="4"  height="56"/>
    <!-- bottom-left -->
    <rect x="24"   y="452" width="56" height="4"/>
    <rect x="24"   y="400" width="4"  height="56"/>
    <!-- bottom-right -->
    <rect x="1320" y="452" width="56" height="4"/>
    <rect x="1372" y="400" width="4"  height="56"/>
  </g>

  <!-- =================== TOP-LEFT CLASSIFIED TAG =================== -->
  <text x="100" y="60" font-family="'Courier New', monospace" font-size="13" letter-spacing="2">
    <tspan fill="#FF6B1A">// CLASSIFIED </tspan>
    <tspan fill="#8B95A7">// FIELD-READY PROTOTYPE</tspan>
  </text>

  <!-- =================== PROJECT CODENAME =================== -->
  <text x="100" y="135" font-family="'Courier New', monospace" font-size="15" fill="#00D9FF" letter-spacing="4" font-weight="bold">PROJECT  PARVI  /  SWARM  (fi.)</text>

  <!-- =================== BIG TITLE =================== -->
  <text x="95" y="290" font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif" font-weight="900" font-size="120" fill="#E6EDF3" letter-spacing="-2">PARVI</text>

  <!-- =================== SUBTITLE LINES =================== -->
  <text x="100" y="335" font-family="'Courier New', monospace" font-size="14" fill="#8B95A7" letter-spacing="2">RESILIENT SWARM COORDINATION  /  SELF-HEALING MESH RADIO</text>
  <text x="100" y="362" font-family="'Courier New', monospace" font-size="14" fill="#8B95A7" letter-spacing="2">ZERO INFRASTRUCTURE  /  NO SINGLE POINT OF FAILURE</text>

  <!-- =================== AMBER UNDERLINE ACCENT =================== -->
  <rect x="100" y="380" width="100" height="4" fill="#FF6B1A"/>

  <!-- =================== BUILD INFO BOTTOM =================== -->
  <text x="100" y="440" font-family="'Courier New', monospace" font-size="12" letter-spacing="1">
    <tspan fill="#8B95A7">BUILD </tspan>
    <tspan fill="#E6EDF3">v0.1.0-hack </tspan>
    <tspan fill="#8B95A7">// </tspan>
    <tspan fill="#E6EDF3">RUSTC 1.83 </tspan>
    <tspan fill="#8B95A7">// </tspan>
    <tspan fill="#E6EDF3">RTL8812AU</tspan>
  </text>

  <!-- =================== RIGHT-SIDE TAG =================== -->
  <text x="1310" y="440" font-family="'Courier New', monospace" font-size="12" fill="#FF6B1A" letter-spacing="2" text-anchor="end" font-weight="bold">// PARVI</text>

  <!-- =================== MESH NETWORK (RIGHT) =================== -->
  <!-- Edges first so nodes sit on top -->
  <g stroke="#00D9FF" stroke-opacity="0.55" stroke-width="1.3" fill="none">
    <line x1="1015" y1="115" x2="1245" y2="160"/>
    <line x1="1015" y1="115" x2="1100" y2="225"/>
    <line x1="1245" y1="160" x2="1100" y2="225"/>
    <line x1="1245" y1="160" x2="1290" y2="280"/>
    <line x1="1100" y1="225" x2="1290" y2="280"/>
    <line x1="1100" y1="225" x2="1025" y2="305"/>
    <line x1="1290" y1="280" x2="1180" y2="355"/>
    <line x1="1025" y1="305" x2="1180" y2="355"/>
    <line x1="1100" y1="225" x2="1180" y2="355"/>
    <line x1="1015" y1="115" x2="1025" y2="305"/>
  </g>

  <!-- Nodes: outer ring + inner dot + small label -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#8B95A7">
    <circle cx="1015" cy="115" r="16" fill="#070A10" stroke="#FF6B1A" stroke-width="2.5"/>
    <circle cx="1015" cy="115" r="5"  fill="#FF6B1A"/>
    <text   x="1040" y="118">01</text>

    <circle cx="1245" cy="160" r="16" fill="#070A10" stroke="#FF6B1A" stroke-width="2.5"/>
    <circle cx="1245" cy="160" r="5"  fill="#FF6B1A"/>
    <text   x="1270" y="163">02</text>

    <circle cx="1100" cy="225" r="16" fill="#070A10" stroke="#FF6B1A" stroke-width="2.5"/>
    <circle cx="1100" cy="225" r="5"  fill="#FF6B1A"/>
    <text   x="1125" y="228">03</text>

    <circle cx="1290" cy="280" r="16" fill="#070A10" stroke="#FF6B1A" stroke-width="2.5"/>
    <circle cx="1290" cy="280" r="5"  fill="#FF6B1A"/>
    <text   x="1315" y="283">04</text>

    <circle cx="1025" cy="305" r="16" fill="#070A10" stroke="#FF6B1A" stroke-width="2.5"/>
    <circle cx="1025" cy="305" r="5"  fill="#FF6B1A"/>
    <text   x="1050" y="308">05</text>

    <circle cx="1180" cy="355" r="16" fill="#070A10" stroke="#FF6B1A" stroke-width="2.5"/>
    <circle cx="1180" cy="355" r="5"  fill="#FF6B1A"/>
    <text   x="1205" y="358">06</text>
  </g>
</svg>
